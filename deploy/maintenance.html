<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uPixel CRM — Em breve de volta</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,.15) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 70%, rgba(168,85,247,.12) 0%, transparent 60%);
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,.4);
    }

    /* Logo mark */
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 16px;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(99,102,241,.4);
    }
    .logo svg { width: 32px; height: 32px; fill: #fff; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 12px;
      letter-spacing: -.3px;
    }

    p {
      font-size: 15px;
      line-height: 1.7;
      color: #94a3b8;
      margin-bottom: 36px;
    }

    /* Progress bar */
    .progress-wrap {
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 36px;
    }
    .progress-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      width: 70%;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Status dots */
    .status {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
      text-align: left;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #64748b;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b;
                  animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .4; }
    }

    footer {
      font-size: 12px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>

    <h1>Estamos melhorando o uPixel para você</h1>
    <p>
      Nossa equipe está realizando uma atualização rápida.<br>
      O sistema voltará em instantes.
    </p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="status">
      <div class="status-row">
        <span class="dot green"></span>
        Infraestrutura — operacional
      </div>
      <div class="status-row">
        <span class="dot green"></span>
        Banco de dados — operacional
      </div>
      <div class="status-row">
        <span class="dot yellow"></span>
        Aplicação — atualização em andamento
      </div>
    </div>

    <footer>uPixel CRM &mdash; Pixel Systems</footer>
  </div>
</body>
</html>
