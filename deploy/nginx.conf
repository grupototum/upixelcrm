events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Health check endpoint (default server)
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }
    }

    # uPixel CRM - Serve static files
    server {
        listen 80;
        server_name upixel.app www.upixel.app *.upixel.app;

        root /usr/share/nginx/html;
        index index.html;

        # React SPA - all routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # No cache for index.html (always fresh)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # totum.upixel.app - proxy to totum-system container
    upstream totum_system_backend {
        server totum-system:8069;
    }

    server {
        listen 80;
        server_name totum.upixel.app;

        location / {
            proxy_pass http://totum_system_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
