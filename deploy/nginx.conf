events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Health check endpoint (default server)
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }
    }

    # uPixel CRM — proxy para upixel-api com fallback estático
    #
    # Estratégia dupla para zero-downtime:
    #   1. PRIMÁRIO: proxy → upixel-api:3000 (vite preview)
    #   2. FALLBACK: nginx serve dist estático de /usr/share/nginx/html
    #                (ativado automaticamente se container down/rebuild)
    #
    # O resolver + variável permite nginx carregar mesmo se upixel-api
    # não existir no startup (evita crash de todo nginx-totum).
    server {
        listen 80;
        server_name upixel.app www.upixel.app *.upixel.app;

        # Raiz para fallback estático (montado do host /var/www/upixelcrm/dist)
        root /usr/share/nginx/html;

        resolver 127.0.0.11 ipv6=off valid=10s;
        set $upixel_backend "upixel-api:3000";

        # Proxy com fallback: conecta rapidamente (2s) ou cai para estático.
        # Host é passado como "localhost" pois vite preview valida o header —
        # a identidade real do cliente já está em X-Forwarded-For/Proto.
        location / {
            proxy_pass         http://$upixel_backend;
            proxy_set_header   Host              "localhost";
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_connect_timeout  2s;
            proxy_read_timeout    30s;

            proxy_intercept_errors on;
            error_page 403 502 503 504 = @static_fallback;
        }

        # Fallback: serve dist estático (React SPA)
        location @static_fallback {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files $uri $uri/ /index.html;
        }

        # Assets: cache imutável (1 ano) — não passam pelo proxy
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # totum.upixel.app — proxy para totum-system container
    upstream totum_system_backend {
        server totum-system:8069;
    }

    server {
        listen 80;
        server_name totum.upixel.app;

        location / {
            proxy_pass         http://totum_system_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # evolution.grupototum.com — proxy para Evolution API no host
    # Usa resolver + variável para nginx carregar mesmo sem host.docker.internal.
    # No docker-compose do nginx-totum adicione:
    #   extra_hosts:
    #     - "host.docker.internal:host-gateway"
    server {
        listen 80;
        server_name evolution.grupototum.com;

        client_max_body_size 100M;

        resolver 127.0.0.11 ipv6=off valid=10s;
        set $evolution_upstream "host.docker.internal:47398";

        location / {
            proxy_pass         http://$evolution_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
