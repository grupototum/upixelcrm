events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Health check endpoint (default server)
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }
    }

    # uPixel CRM — serve estático de /usr/share/nginx/html
    # (montado via volume: /var/www/upixelcrm/dist → /usr/share/nginx/html)
    # Deploy atualiza esse diretório via atomic swap; nginx serve imediatamente
    # sem restart — zero downtime garantido.
    server {
        listen 80;
        server_name upixel.app www.upixel.app *.upixel.app;

        root  /usr/share/nginx/html;
        index index.html;

        # React SPA: todas as rotas servem index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Assets com hash no nome: cache imutável (1 ano)
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # index.html nunca cacheado (garante bundle hash atualizado)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }
    }

    # evolution.grupototum.com — proxy para Evolution API no host
    # Usa resolver + variável para nginx carregar mesmo sem host.docker.internal.
    # No docker-compose do nginx-totum adicione:
    #   extra_hosts:
    #     - "host.docker.internal:host-gateway"
    server {
        listen 80;
        server_name evolution.grupototum.com;

        client_max_body_size 100M;

        resolver 127.0.0.11 ipv6=off valid=10s;
        set $evolution_upstream "host.docker.internal:47398";

        location / {
            proxy_pass         http://$evolution_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
