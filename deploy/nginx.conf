events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Health check endpoint (default server)
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "Nginx Healthy";
            add_header Content-Type text/plain;
        }
    }

    # uPixel CRM - proxy para upixel-api (vite preview na porta 3000)
    upstream upixel_api_backend {
        server upixel-api:3000;
    }

    server {
        listen 80;
        server_name upixel.app www.upixel.app *.upixel.app;

        # Sem cache no HTML (sempre versão fresca, evita bundle hash quebrado)
        location = / {
            proxy_pass http://upixel_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /index.html {
            proxy_pass http://upixel_api_backend;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Tudo o mais (assets, rotas SPA) — proxy normal
        location / {
            proxy_pass http://upixel_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # totum.upixel.app - proxy to totum-system container
    upstream totum_system_backend {
        server totum-system:8069;
    }

    server {
        listen 80;
        server_name totum.upixel.app;

        location / {
            proxy_pass http://totum_system_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # evolution.grupototum.com - proxy to Evolution API rodando no host
    # NOTA: usamos resolver + variável para que nginx LOAD mesmo se
    # `host.docker.internal` não resolver no startup (em Linux precisa de
    # extra_hosts: "host.docker.internal:host-gateway" no docker-compose).
    server {
        listen 80;
        server_name evolution.grupototum.com;

        client_max_body_size 100M;

        resolver 127.0.0.11 ipv6=off valid=10s;
        set $evolution_upstream "host.docker.internal:47398";

        location / {
            proxy_pass http://$evolution_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
