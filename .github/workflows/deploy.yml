name: Deploy Upixel to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Show bundle info
        run: |
          du -sh dist
          ls dist/assets/index-*.js 2>/dev/null | head -1

      - name: Package dist + deploy scripts
        run: tar -czf upixel-deploy.tar.gz dist/ deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upixel-deploy
          path: upixel-deploy.tar.gz
          retention-days: 7

  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set — skipping edge function deploy"
            exit 0
          fi
          npx supabase@latest functions deploy --project-ref xusdhzwfkzufupjwbebt

  deploy-vps:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: upixel-deploy
          path: ./

      - name: Copy bundle to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH_OPTS="-i /tmp/deploy_key \
            -p ${VPS_SSH_PORT:-2222} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=90 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes"
          rsync -avz --progress -e "ssh $SSH_OPTS" \
            upixel-deploy.tar.gz \
            "$VPS_USERNAME@$VPS_HOST:/tmp/"
          rm -f /tmp/deploy_key

      - name: Swap dist + reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          command_timeout: 3m
          script: |
            set -e
            rm -rf /tmp/upixel-extract
            mkdir -p /tmp/upixel-extract
            tar -xzf /tmp/upixel-deploy.tar.gz -C /tmp/upixel-extract
            bash /tmp/upixel-extract/deploy/deploy.sh /tmp/upixel-extract
            rm -rf /tmp/upixel-extract /tmp/upixel-deploy.tar.gz
